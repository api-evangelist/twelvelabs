description: >-
  FinOps view of TwelveLabs spend. TwelveLabs bills usage-based per-video-minute
  rates for Marengo indexing and Pegasus analysis input, per-1,000-query rates
  for search, per-1,000-token rates for generated output, and per-minute /
  per-1,000-request rates for embeddings, plus a monthly embedding
  infrastructure charge. A Free plan provides limited included processing, and
  Enterprise uses committed-use contracts.
notes: >-
  Per-feature rates are subject to change; verify against the TwelveLabs pricing
  page during reconciliation. Indexing is a one-time per-minute charge per video.
