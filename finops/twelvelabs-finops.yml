meters:
- name: indexing_minutes
  description: Video minutes indexed by Marengo, billed once per minute per video at $0.042/min.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - index
  - model
- name: search_queries
  description: Any-to-video search queries, billed per 1,000 queries at $4/1K.
  unit: queries
  aggregation: sum
  dimensions:
  - account
  - index
- name: analyze_input_minutes
  description: Video minutes fed to Pegasus analysis, billed per minute at $0.0292/min.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - model
- name: analyze_output_tokens
  description: Text tokens generated by Pegasus (analyze, gist, summarize), billed per 1K tokens at $0.0075/1K.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - model
- name: embed_audio_minutes
  description: Audio minutes embedded by Marengo, billed per minute at $0.0083/min.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - model
- name: embed_image_requests
  description: Image embedding requests, billed per 1,000 requests at $0.10/1K.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - model
- name: embed_text_requests
  description: Text embedding requests, billed per 1,000 requests at $0.07/1K.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - model
- name: embed_infrastructure_minutes
  description: Monthly embedding infrastructure usage, billed per minute at $0.0015/min.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Pull TwelveLabs usage from the dashboard; inspect minutes indexed, queries run, and tokens generated per index and model.
- name: Allocation
  description: Tag API keys and indexes per workload/team; map indexing, search, analyze, and embed spend to internal cost centers.
- name: Optimization
  description: Index only the modalities you query; reuse indexed video rather than re-indexing; batch analysis prompts; cache embeddings; prune Free-plan indexes before 90-day expiry to control re-indexing cost.
- name: Accountability
  description: Assign owners per index/project; review per-minute indexing and per-token generation spend monthly against budget.
